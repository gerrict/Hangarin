{% load i18n %}
{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Confirm Login - Hangarin</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />

<style>
    body {
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        background: #eef1f6;
        font-family: "Segoe UI", sans-serif;
    }

    .auth-card {
        max-width: 420px;
        width: 100%;
        background: #fff;
        border-radius: 16px;
        padding: 2rem;
        text-align: center;
        box-shadow: 0 8px 20px rgba(0,0,0,0.08);
        transition: all 0.3s ease;
    }

    .auth-card:hover {
        transform: translateY(-5px);
        box-shadow: 0 15px 35px rgba(0,0,0,0.12);
    }

    .icon-box {
        width: 70px;
        height: 70px;
        margin: 0 auto 1rem;
        border-radius: 16px;
        background: #f1f3ff;
        display: flex;
        align-items: center;
        justify-content: center;
        color: #667eea;
        font-size: 1.8rem;
    }

    h3 {
        font-weight: 700;
    }

    p {
        color: #6c757d;
        font-size: 0.95rem;
    }

    .btn-primary {
        background-color: #667eea;
        border: none;
        border-radius: 10px;
        font-weight: 600;
        padding: 0.6rem;
        transition: all 0.2s ease;
    }

    .btn-primary:hover {
        background-color: #5a67d8;
        transform: translateY(-2px);
        box-shadow: 0 5px 15px rgba(0,0,0,0.08);
    }

    .btn-outline-secondary {
        border-radius: 10px;
        transition: all 0.2s ease;
    }

    .btn-outline-secondary:hover {
        transform: translateY(-2px);
        box-shadow: 0 5px 15px rgba(0,0,0,0.05);
    }
</style>
</head>

<body>

<div class="auth-card">

    <!-- Icon -->
    <div class="icon-box">
        <i class="fas fa-user-shield"></i>
    </div>

    <!-- Title -->
    <h3 class="mb-3">Confirm Sign In</h3>

    <!-- Description -->
    <p class="mb-4">
        You are about to sign in using your 
        <strong class="text-primary">{{ provider.name }}</strong> account.
    </p>

    <!-- Confirm -->
    <form method="post">
        {% csrf_token %}
        <button type="submit" class="btn btn-primary w-100 mb-2">
            <i class="fas fa-check me-2"></i>
            Continue with {{ provider.name }}
        </button>
    </form>

    <!-- Cancel -->
    <a href="{% url 'account_login' %}" class="btn btn-outline-secondary w-100">
        <i class="fas fa-times me-2"></i>
        Cancel
    </a>

</div>

</body>
</html>
